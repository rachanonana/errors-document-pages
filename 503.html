<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temporary Error</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Prompt", sans-serif;
    }

    body {
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      text-align: center;
    }

    .icon-wrapper {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto 24px;
    }

    .paper {
      width: 78px;
      height: 92px;
      background: #ffffff;
      border-radius: 10px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .paper::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 18px;
      width: 32px;
      height: 4px;
      border-radius: 10px;
      background: #f4d000;
    }

    .paper::after {
      content: "";
      position: absolute;
      top: 34px;
      left: 18px;
      width: 42px;
      height: 30px;
      background:
        linear-gradient(#d8d8d8 4px, transparent 4px) repeat-y;
      background-size: 100% 10px;
    }

    .dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #b8ff00;
      border-radius: 50%;
      top: 16px;
      left: 18px;
    }

    .error-circle {
      position: absolute;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #b8ff00;
      right: 8px;
      bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(184, 255, 0, 0.35);
    }

    .error-circle::before,
    .error-circle::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 3px;
      background: #2b2b2b;
      border-radius: 10px;
    }

    .error-circle::before {
      transform: rotate(45deg);
    }

    .error-circle::after {
      transform: rotate(-45deg);
    }

    .message {
      color: #2c2c2c;
      font-size: 22px;
      line-height: 1.5;
      margin-bottom: 28px;
      font-weight: 500;
    }

    .btn {
      width: 320px;
      max-width: 90vw;
      height: 54px;
      border: none;
      border-radius: 14px;
      background: #b8ff00;
      color: #222;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      opacity: 0.92;
    }

    .btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 480px) {
      .message {
        font-size: 18px;
        padding: 0 20px;
      }

      .btn {
        height: 50px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="icon-wrapper">
      <div class="dot"></div>
      <div class="paper"></div>
      <div class="error-circle"></div>
    </div>

    <div class="message">
      ไม่สามารถใช้งานเมนูนี้ได้ชั่วคราว<br />
      กรุณาปิดแอปพลิเคชัน<br />
      และดำเนินการใหม่อีกครั้ง
    </div>

    <button class="btn" onclick="location.reload()">
      ปิด
    </button>
  </div>
</body>
</html>
